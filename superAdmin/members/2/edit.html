<script>
(function(){
    // 구버전 키(sa_theme) → 신규 키(tt_theme) 일회성 마이그레이션
    var legacy = localStorage.getItem('sa_theme');
    if (legacy !== null) {
        if (!localStorage.getItem('tt_theme')) {
            localStorage.setItem('tt_theme', legacy === 'sa-light' ? 'light' : 'dark');
        }
        localStorage.removeItem('sa_theme');
    }
    // superAdmin 기본 테마는 다크. tt_theme === 'light' 일 때만 sa-light 적용
    var t = localStorage.getItem('tt_theme');
    if (t === 'light') document.body.classList.add('sa-light');
})();
</script>

<script>
(function(){
    var btn = document.getElementById('saThemeBtn');
    var isLight = document.body.classList.contains('sa-light');
    if (btn) btn.textContent = isLight
        ? '🌙 어둡게'
        : '☀️ 밝게';
})();

function saToggleTheme() {
    var body = document.body;
    var btn  = document.getElementById('saThemeBtn');
    if (body.classList.contains('sa-light')) {
        body.classList.remove('sa-light');
        localStorage.setItem('tt_theme', 'dark');
        if (btn) btn.textContent = '☀️ 밝게';
    } else {
        body.classList.add('sa-light');
        localStorage.setItem('tt_theme', 'light');
        if (btn) btn.textContent = '🌙 어둡게';
    }
}
</script>

<script>
var CTX_EDIT = '/TripTogether';
var MEMBER_IDX = '2';
var MEMBER_EDIT_MESSAGES = {
    saved: '저장되었습니다.',
    saveFailed: '저장 실패',
    saveError: '저장 중 오류가 발생했습니다.',
    groupRequired: '그룹을 선택하세요.',
    confirmApplyGroup: '[{0}] 그룹 권한을 적용하시겠습니까?\n기존 권한이 모두 교체됩니다.',
    groupEmpty: '그룹에 권한이 없습니다.',
    groupApplied: '그룹 권한이 적용되었습니다.',
    applyFailed: '적용 실패',
    error: '오류가 발생했습니다.'
};

function formatMemberEditMessage(template) {
    var args = Array.prototype.slice.call(arguments, 1);
    return template.replace(/\u007B(\d+)\u007D/g, function(_, idx) {
        return args[idx] !== undefined ? args[idx] : '';
    });
}

function setMode(mode) {
    var content = document.getElementById('sa-profile-content');
    if (mode === 'advanced') {
        content.classList.add('sa-mode-advanced');
    } else {
        content.classList.remove('sa-mode-advanced');
    }
    document.getElementById('btn-basic').classList.toggle('active', mode === 'basic');
    document.getElementById('btn-advanced').classList.toggle('active', mode === 'advanced');
}


function showSection(key, el) {
    document.querySelectorAll('.sa-profile-section').forEach(function(s) { s.classList.remove('active'); });
    document.querySelectorAll('.sa-profile-menu-item').forEach(function(a) { a.classList.remove('active'); });
    document.getElementById('sec-' + key).classList.add('active');
    el.classList.add('active');
}

function saveSection() {
    var form   = document.getElementById('editForm');
    var params = new URLSearchParams(new FormData(form));
    fetch(CTX_EDIT + '/superAdmin/members/' + MEMBER_IDX + '/edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-Requested-With': 'XMLHttpRequest' },
        body: params.toString()
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) { adm_toast(MEMBER_EDIT_MESSAGES.saved); }
        else              { adm_toast(data.message || MEMBER_EDIT_MESSAGES.saveFailed, 'error'); }
    })
    .catch(function() { adm_toast(MEMBER_EDIT_MESSAGES.saveError, 'error'); });
}

function applyGroupPerms() {
    var sel = document.getElementById('editGroupApplySelect');
    if (!sel || !sel.value) { adm_toast(MEMBER_EDIT_MESSAGES.groupRequired, 'error'); return; }
    var groupName = sel.options[sel.selectedIndex].text;
    if (!confirm(formatMemberEditMessage(MEMBER_EDIT_MESSAGES.confirmApplyGroup, groupName))) return;

    fetch(CTX_EDIT + '/superAdmin/groups/' + encodeURIComponent(sel.value))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (!data.items || data.items.length === 0) { adm_toast(MEMBER_EDIT_MESSAGES.groupEmpty, 'error'); return; }
            var params = new URLSearchParams();
            data.items.forEach(function(i) { params.append('permissionCodes', i.permissionCode); });
            return fetch(CTX_EDIT + '/superAdmin/members/' + MEMBER_IDX + '/permissions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-Requested-With': 'XMLHttpRequest' },
                body: params.toString()
            });
        })
        .then(function(r) { return r ? r.json() : null; })
        .then(function(data) {
            if (data && data.success) adm_toast(MEMBER_EDIT_MESSAGES.groupApplied);
            else if (data) adm_toast(data.message || MEMBER_EDIT_MESSAGES.applyFailed, 'error');
        })
        .catch(function() { adm_toast(MEMBER_EDIT_MESSAGES.error, 'error'); });
}
</script>


<script>
function adm_toast(msg, type = 'success') {
    const c   = document.getElementById('adm-toast-container');
    const el  = document.createElement('div');
    el.className = 'adm-toast ' + type;
    el.innerHTML = (type === 'success' ? '✅ ' : '❌ ') + msg;
    c.appendChild(el);
    setTimeout(() => { el.classList.add('is-hiding'); setTimeout(()=>el.remove(),300); }, 2800);
}
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        document.querySelectorAll('.adm-modal-overlay.open').forEach(o => o.classList.remove('open'));
    }
});

/* ── 사이드바 햄버거 드로어 ── */
(function () {
    var toggle   = document.getElementById('sidebar-toggle');
    var sidebar  = document.getElementById('adm-sidebar');
    var backdrop = document.getElementById('admBackdrop');
    if (!toggle || !sidebar || !backdrop) return;

    var mqDesktop = window.matchMedia('(min-width: 1024px)');

    function openDrawer() {
        sidebar.classList.add('open');
        backdrop.hidden = false;
        requestAnimationFrame(function () { backdrop.classList.add('is-open'); });
        toggle.classList.add('is-open');
        toggle.setAttribute('aria-expanded', 'true');
        document.body.classList.add('adm-nav-lock');
    }
    function closeDrawer() {
        sidebar.classList.remove('open');
        backdrop.classList.remove('is-open');
        backdrop.hidden = true;
        toggle.classList.remove('is-open');
        toggle.setAttribute('aria-expanded', 'false');
        document.body.classList.remove('adm-nav-lock');
    }
    toggle.addEventListener('click', function () {
        if (sidebar.classList.contains('open')) closeDrawer(); else openDrawer();
    });
    backdrop.addEventListener('click', closeDrawer);
    sidebar.addEventListener('click', function (e) {
        if (mqDesktop.matches) return;
        var link = e.target.closest('a');
        if (link) closeDrawer();
    });
    var onChange = function (e) { if (e.matches) closeDrawer(); };
    if (mqDesktop.addEventListener) mqDesktop.addEventListener('change', onChange);
    else if (mqDesktop.addListener) mqDesktop.addListener(onChange);
})();
</script>
